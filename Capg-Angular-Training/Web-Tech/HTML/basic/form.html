<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>Form Fields</h1>

    <form action="#">
        <fieldset>
            <legend>Application Form</legend>

            <label for="name">Name: </label>
            <input type="text" id="name" name="name">
            <br>

            <label for="email">Email: </label>
            <input type="email" name="email" id="email">
            <br>

            <label for="password">Password: </label>
            <input type="password" name="password" id="password">
            <br>

            <label for="gender">Gender: </label>
            Male<input type="radio" name="gender" id="gender">
            Female<input type="radio" name="gender" id="gender">
            Other<input type="radio" name="gender" id="gender">
            <br>

            <label for="skills">Skills: </label>
            HTML<input type="checkbox" name="skills" id="skills">
            CSS<input type="checkbox" name="skills" id="skills">
            JS<input type="checkbox" name="skills" id="skills">
            UI<input type="checkbox" name="skills" id="skills">
            <br>


            <label for="textarea">TextArea</label>
            <textarea name="textarea" id="textarea"></textarea>

            <br>
            <input type="submit">
            <button type="submit">Submit</button>
        </fieldset>
    </form>

</body>
</html>
