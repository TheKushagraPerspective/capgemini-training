<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Selectors</title>

    <style>
        /* Universal */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Element */
        p {
            font-size: 18px;
        }

        /* Class */
        .text {
            color: blue;
        }

        /* Id */
        #special {
            color: red;
        }

        /* Grouping tags */
        h1 , h2 {
            background-color: yellow;
        }
    </style>
</head>
<body>

    <h1>Heading 1</h1>
    <h2>Heading 2</h2>

    <p>This is normal paragraph</p>

    <p class="text">This is CLASS styled</p>

    <p id="special">This is ID styled</p>
    
</body>
</html>
