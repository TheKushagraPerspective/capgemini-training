<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Properties</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: yellowgreen;
        }

        main {
            height: 80vh;
            width: 70vw;
            margin: 50px auto;
            /* border: 2px solid; */
            display: grid;
            grid-template-columns: 1fr 2fr 2fr;
            grid-template-rows: 1fr 1fr 1fr 1fr;
            /* column-gap: 10px;
            row-gap: 10px; */
            gap: 10px;
        }
        
        section{ 
            border: 2px solid gray;
            place-content: center;
            /* justify-content: center; */
            text-align: center;
        }

        .box1 {
            /* grid-column-start: 1;
            grid-column-end: 4; 
            grid-row-start: 1;
            grid-row-end: 2; */
            grid-column: 1/4;
            grid-row: 1/2;
            background-color: rgb(27, 236, 27);
        }

        .box2 {
            /* grid-row-start: 2;
            grid-row-end: 4;
            grid-column-start: 1;
            grid-column-end: 2;  */
            grid-column: 1/2;
            grid-row: 2/4;
            background-color: rgb(27, 236, 27);
        }

        .box3 {
            /* using grid-area: rowStart/colStart/rowEnd/colEnd */
            grid-area: 2/2/3/4;
            background-color: rgb(27, 236, 27);
        }

        .box4 {
            /* using grid-area: rowStart/colStart/rowEnd/colEnd */
            grid-area: 3/2/4/3;
            background-color: rgb(27, 236, 27);
        }

        .box5 {
            /* using grid-area: rowStart/colStart/rowEnd/colEnd */
            grid-area: 3/3/4/4;
            background-color: rgb(27, 236, 27);
        }

        .box6 {
            /* using grid-area: rowStart/colStart/rowEnd/colEnd */
            grid-area: 4/1/5/4;
            background-color: rgb(27, 236, 27);
        }
    </style>
</head>
<body>

    <h1>This is Grid Layout</h1>

    <main>
        <section class="box box1">Header</section>
        <section class="box box2">Side Bar</section>
        <section class="box box3">Content 1</section>
        <section class="box box4">Content 2</section>
        <section class="box box5">Content 3</section>
        <section class="box box6">Footer</section>
    </main>
    
</body>
</html>
