

<h3>Child Component</h3>
<p>{{ message }}</p>

<br>

<h4>Fruits List:</h4>
<ul>
  <li *ngFor="let fruit of fruits">
    {{ fruit }}
  </li>
</ul>

<br>
<h4>User Details:</h4>
<p>Name: {{ user.name }}</p>
<p>Age: {{ user.age }}</p>



<button (click)="sendMessageToParent()">
  Send Message to Parent
</button>
