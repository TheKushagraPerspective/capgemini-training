server:
  port: 9080   #  

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    hostname: localhost


spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      routes:
        - id: order-service
          uri: lb://ORDER-SERVICE   # SERVICE NAME, NOT PORT
          predicates:
            - Path=/order/**
        - id: inventory-service
          uri: lb://INVENTORY-SERVICE   # SERVICE NAME, NOT PORT
          predicates:
            - Path=/inventory/**
        - id: product-service
          uri: lb://PRODUCT-SERVICE   # SERVICE NAME, NOT PORT
          predicates:
            - Path=/product/**				