server:
  port: 8090   #  

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    hostname: localhost


spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      routes:
        - id: book-service
          uri: lb://BOOK-SERVICE   # SERVICE NAME, NOT PORT
          predicates:
            - Path=/api/books/**
        - id: order-service
          uri: lb://ORDER-SERVICE   # SERVICE NAME, NOT PORT
          predicates:
            - Path=/api/orders/**        